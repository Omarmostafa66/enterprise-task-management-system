version: '3.8'

services:
  web:
    build: .
    container_name: fastapi_app
    ports:
      - "8000:8000"
    environment:
      # Tell the app to connect to the Redis container using its service name
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    volumes:
      # Map the local directory to the container to reflect code changes instantly
      - .:/app

  redis:
    image: redis:alpine
    container_name: redis_cache
    ports:
      - "6379:6379"